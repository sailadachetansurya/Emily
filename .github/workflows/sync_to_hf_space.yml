name: Sync to Hugging Face Space

on:
  push:
    branches:
      - main
      - feature/echo-monorepo-refactor

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push --force https://DHEERAJbb:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/DHEERAJbb/echo-emily-backend HEAD:main
